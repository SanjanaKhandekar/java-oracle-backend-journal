# Day 13: Hardening Database Connection Properties for High Traffic Production Environments
# Topic: Spring Boot Hikari Connection Pool Tuning & Oracle Dialect Configuration

# Oracle Database Connection
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=fresher_dev
spring.datasource.password=password123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP Connection Pool Optimizations
# Maximum number of actual connections to the Oracle database engine allowed in the pool
spring.datasource.hikari.maximum-pool-size=15
# Minimum number of idle connections HikariCP tries to maintain in the pool
spring.datasource.hikari.minimum-idle=5
# Maximum time (in milliseconds) a connection can sit idle before being released (5 minutes)
spring.datasource.hikari.idle-timeout=300000
# Maximum time (in milliseconds) the app waits for a connection from the pool before throwing an error (20 seconds)
spring.datasource.hikari.connection-timeout=20000
# Maximum lifetime of a connection in the pool before being retired and recreated (20 minutes)
spring.datasource.hikari.max-lifetime=1200000

# Hibernate SQL Engine Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Benefit: Standard production configurations prevent "Connection Pool Exhaustion" errors. 
# Reusing active database connections instead of closing and recreating them saves massive server processing power.
