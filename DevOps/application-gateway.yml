# Day 17: Spring Cloud Gateway routing config to centralize microservice endpoints
# Topic: Microservices Architecture & Intelligent API Routing

server:
  port: 8060 # Unified network entry point port for the entire ecosystem

spring:
  cloud:
    gateway:
      routes:
        # Route 1: Direct requests coming to /api/v1/auth/** to the Auth Microservice
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # Route 2: Direct requests coming to /api/v1/orders/** to the Order Microservice
        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - AddRequestHeader=X-Gateway-Request, Verified-Source

# Benefit: Solves url exposure vulnerabilities. Instead of forcing client UIs to manage 
# and explicitly trust multiple ports or backend service host addresses, the frontend 
# connects to a single proxy gateway (8060) which manages intelligent load distribution.
